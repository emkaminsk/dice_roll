<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dice Roll &amp; Random Picker</title>
    <meta name="description" content="A lightweight set of fair, in-browser random tools: roll a dice, pick a random option, and spin the wheel.">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="all.min.css">
    <link rel="stylesheet" href="vendor/bootstrap.min.css">
    <link rel="stylesheet" href="vendor/inter.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="home-link">
        <a href="https://mkhome.byst.re">
            <i class="fas fa-home"></i>
        </a>
    </div>
    <header class="page-header">
      <h1>Dice Roll &amp; Random Picker</h1>
      <p class="tagline">Fair, instant, in-browser random choices — no login, nothing stored.</p>
    </header>

    <main class="container">
      <div class="tools-grid">
        <!-- Dice Roller -->
        <section class="tool-card" aria-labelledby="dice-title">
          <h2 id="dice-title">🎲 Roll the dice</h2>
          <form name="Dice" novalidate>
            <div class="form-group">
              <label for="max">Number of sides</label>
              <input type="number" id="max" name="max" min="1" value="6" class="form-control narrow-input">
            </div>
            <button type="submit" class="btn btn-primary">Roll</button>
            <div id="dice-graphics" class="dice-graphics"></div>
            <p id="result" class="result-line"></p>
          </form>
        </section>

        <!-- Wheel of Fortune -->
        <section class="tool-card" aria-labelledby="wheel-title">
          <h2 id="wheel-title">🎡 Spin the wheel</h2>
          <div class="wheel-stage">
            <div class="wheel-pointer" aria-hidden="true"></div>
            <canvas id="wheel-canvas" role="img" aria-label="Wheel of names"></canvas>
          </div>
          <textarea id="wheel-names" class="form-control wheel-names" rows="4"
            placeholder="One name per line"
            aria-label="Wheel names, one per line"></textarea>
          <div class="btn-row">
            <button type="button" id="wheel-spin" class="btn btn-primary btn-sm">Spin</button>
          </div>
          <p id="wheel-result" class="result-line"></p>
        </section>
      </div>

      <!-- Random pickers (one-or-more independent sections) -->
      <section class="pickers" aria-labelledby="picker-title">
        <div class="pickers-head">
          <h2 id="picker-title">🎯 Randomly choose an option</h2>
          <button type="button" id="add-section" class="btn btn-outline-secondary btn-sm">Add picker</button>
        </div>
        <div id="picker-sections" class="picker-grid"></div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Everything runs in your browser. Reload to start fresh.</p>
    </footer>

    <script src="random.js"></script>
    <script src="celebration.js"></script>
    <script src="dice_roll.js"></script>
    <script src="value_selector.js"></script>
    <script src="wheel.js"></script>
  </body>
</html>
